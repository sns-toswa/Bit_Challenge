<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Battle - Технічне Завдання</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Login/Register Page -->
        <div id="authPage" class="page">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>⚔️ TASK BATTLE</h1>
                    <p>Технічне Завдання</p>
                </div>

                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вхід</button>
                    <button class="auth-tab" data-tab="register">Реєстрація</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label for="loginUsername">Ім'я користувача:</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Пароль:</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Вхід</button>
                    <div id="loginError" class="error-message"></div>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="registerUsername">Ім'я користувача:</label>
                        <input type="text" id="registerUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email:</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Пароль:</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPasswordConfirm">Підтвердьте пароль:</label>
                        <input type="password" id="registerPasswordConfirm" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Реєстрація</button>
                    <div id="registerError" class="error-message"></div>
                </form>
            </div>
        </div>

        <!-- Dashboard Page -->
        <div id="dashboardPage" class="page hidden">
            <nav class="navbar">
                <div class="nav-content">
                    <h1 class="nav-title">⚔️ TASK BATTLE</h1>
                    <div class="nav-links">
                        <button class="nav-btn" data-page="dashboard">Гра</button>
                        <button class="nav-btn" data-page="leaderboard">Рейтинг</button>
                        <button class="nav-btn" data-page="profile">Профіль</button>
                        <button class="nav-btn" id="logoutBtn">Вихід</button>
                    </div>
                </div>
            </nav>

            <div class="dashboard-container">
                <!-- Games Section -->
                <div id="gamesSection" class="section">
                    <h2>Доступні Битви</h2>
                    <div class="section-controls">
                        <button class="btn btn-secondary" id="createBattleBtn">+ Створити Битву</button>
                        <button class="btn btn-secondary" id="createTaskBtn">+ Створити Завдання</button>
                    </div>
                    <div id="battlesList" class="battles-list">
                        <p class="loading">Завантаження...</p>
                    </div>
                </div>

                <!-- Leaderboard Section -->
                <div id="leaderboardSection" class="section hidden">
                    <h2>Топ Гравців</h2>
                    <div id="leaderboardList" class="leaderboard-list">
                        <p class="loading">Завантаження...</p>
                    </div>
                </div>

                <!-- Profile Section -->
                <div id="profileSection" class="section hidden">
                    <h2>Мій Профіль</h2>
                    <div id="profileContent" class="profile-content">
                        <p class="loading">Завантаження...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Battle Modal -->
        <div id="createBattleModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Створити Битву</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="createBattleForm">
                    <div class="form-group">
                        <label for="taskSelect">Виберіть Завдання:</label>
                        <select id="taskSelect" required>
                            <option value="">-- Завантаження завдань --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="opponentUsername">Суперник (опціонально):</label>
                        <input type="text" id="opponentUsername" placeholder="Ім'я користувача">
                    </div>
                    <button type="submit" class="btn btn-primary">Розпочати Битву</button>
                </form>
            </div>
        </div>

        <!-- Create Task Modal -->
        <div id="createTaskModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Створити Завдання</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="createTaskForm">
                    <div class="form-group">
                        <label for="taskTitle">Назва Завдання:</label>
                        <input type="text" id="taskTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Опис:</label>
                        <textarea id="taskDescription" rows="6" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="taskDifficulty">Складність:</label>
                        <select id="taskDifficulty">
                            <option value="easy">Легка</option>
                            <option value="medium" selected>Середня</option>
                            <option value="hard">Складна</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Створити</button>
                </form>
            </div>
        </div>

        <!-- Battle Arena Modal -->
        <div id="battleArenaModal" class="modal hidden">
            <div class="modal-content large">
                <div class="modal-header">
                    <h2 id="battleTitle">Битва</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="battle-arena">
                    <div class="battle-task">
                        <h3>Завдання</h3>
                        <div id="battleTaskContent" class="task-content"></div>
                    </div>
                    <div class="battle-editor">
                        <div class="editor-header">
                            <h3>Ваш Код</h3>
                            <div class="editor-controls">
                                <button class="btn btn-small" id="submitCodeBtn">Відправити Код</button>
                                <button class="btn btn-small btn-danger" id="forfeitBtn">Здатися</button>
                            </div>
                        </div>
                        <textarea id="codeEditor" placeholder="Напишіть ваш код тут..."></textarea>
                    </div>
                    <div class="battle-status">
                        <h3>Статус Битви</h3>
                        <div id="battleStatus" class="status-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
